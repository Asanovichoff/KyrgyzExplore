spring:
  application:
    name: kyrgyzexplore

  config:
    # Automatically loads ../infrastructure/.env when running from the backend/ directory.
    # "optional:" means startup doesn't fail if the file doesn't exist.
    import: "optional:file:../infrastructure/.env[.properties]"

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kyrgyzexplore}
    username: ${DB_USER:kyrgyz}
    password: ${DB_PASSWORD:kyrgyz_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate       # Flyway manages the schema — JPA only validates it
    open-in-view: false        # prevents DB connections leaking into the HTTP thread
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev_pass}

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars}
  expiration-ms: 900000        # 15 minutes
  refresh-expiration-ms: 2592000000  # 30 days

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:eu-central-1}
  s3:
    bucket: ${AWS_S3_BUCKET:kyrgyzexplore-media}
    presign-duration-minutes: 15  # how long a pre-signed upload URL stays valid

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  platform-fee-percent: 10

firebase:
  project-id: ${FIREBASE_PROJECT_ID:REPLACE_ME}
  service-account-json-base64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:REPLACE_ME}

logging:
  level:
    com.kyrgyzexplore: DEBUG
    org.springframework.security: INFO
