name: CI — KyrgyzExplore

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Backend Tests ──────────────────────────────────────────────────────────────
jobs:
  backend-test:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: kyrgyzexplore_test
          POSTGRES_USER: kyrgyz
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        working-directory: backend
        run: ./mvnw verify -B
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/kyrgyzexplore_test
          DATABASE_USERNAME: kyrgyz
          DATABASE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_32_chars_minimum_here
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_S3_BUCKET: test-bucket
          AWS_REGION: eu-central-1
          SENDGRID_API_KEY: SG.dummy
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: dGVzdA==

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

# ── Frontend Tests ─────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Flutter)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Run code generation
        working-directory: frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (static analysis)
        working-directory: frontend
        run: flutter analyze --fatal-infos

      - name: Run tests
        working-directory: frontend
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

# ── Database Migration Check ────────────────────────────────────────────────────
  database-check:
    name: Database Migration Validation
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'database/') || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: kyrgyzexplore_test
          POSTGRES_USER: kyrgyz
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Flyway CLI
        run: |
          curl -sSL https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.13.0/flyway-commandline-10.13.0-linux-x64.tar.gz | tar xz
          echo "$(pwd)/flyway-10.13.0" >> $GITHUB_PATH

      - name: Run migrations on clean database
        run: |
          flyway \
            -url="jdbc:postgresql://localhost:5432/kyrgyzexplore_test" \
            -user=kyrgyz \
            -password=test_password \
            -locations=filesystem:database/migrations \
            migrate

      - name: Validate migration checksums
        run: |
          flyway \
            -url="jdbc:postgresql://localhost:5432/kyrgyzexplore_test" \
            -user=kyrgyz \
            -password=test_password \
            -locations=filesystem:database/migrations \
            validate

# ── Build Summary ─────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, database-check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend-test.result }}" == "failure" || \
                "${{ needs.frontend-test.result }}" == "failure" || \
                "${{ needs.database-check.result }}" == "failure" ]]; then
            echo "❌ One or more CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
