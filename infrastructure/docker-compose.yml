version: "3.9"

# KyrgyzExplore — Local Development Stack
# Usage:
#   cd infrastructure
#   cp .env.example .env       (fill in your secrets)
#   docker-compose up -d
#
# Services:
#   PostgreSQL + PostGIS  → localhost:5432
#   Redis                 → localhost:6379
#   PgAdmin               → http://localhost:5050
#   MailHog (SMTP catcher)→ http://localhost:8025

services:

  # ── PostgreSQL 16 with PostGIS ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: kyrgyz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kyrgyzexplore
      POSTGRES_USER:     kyrgyz
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-kyrgyz_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyrgyz -d kyrgyzexplore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kyrgyz_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PgAdmin 4 ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kyrgyz_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@kyrgyz.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

  # ── MailHog (local SMTP catcher — catches all outbound email) ───────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: kyrgyz_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  default:
    name: kyrgyz_network
