name: kyrgyz_explore
description: KyrgyzExplore — booking marketplace for Kyrgyzstan

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Maps & location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  flutter_secure_storage: ^9.0.0

  # Payments
  flutter_stripe: ^10.1.0

  # Push notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Media
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1

  # URL launching (Stripe Connect onboarding)
  url_launcher: ^6.3.0

  # UI utilities
  intl: ^0.20.2
  shimmer: ^3.0.0
  animations: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  generate: true
